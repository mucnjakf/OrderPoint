<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrderPoint – Admin Login</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <div class="login-page">
        <div class="login-card">

            <!-- Header -->
            <div class="login-card-head">
                <div class="login-logo">
                    <span class="material-icons">local_bar</span>
                </div>
                <div class="login-card-title">OrderPoint</div>
                <div class="login-card-sub">Admin Panel — Cafe &amp; Bar Management</div>
            </div>

            <!-- Body -->
            <div class="login-card-body">
                <p class="text-sm text-muted mb-24" style="text-align:center;">Sign in to your administrator account</p>

                <div class="form-field">
                    <label class="form-label">Email address</label>
                    <div class="input-wrap">
                        <span class="material-icons">email</span>
                        <input type="email" class="form-input" placeholder="admin@orderpoint.com"
                            value="admin@orderpoint.com" />
                    </div>
                </div>

                <div class="form-field mb-8">
                    <label class="form-label">Password</label>
                    <div class="input-wrap input-wrap-end">
                        <input type="password" class="form-input" placeholder="••••••••" value="••••••••"
                            style="padding-left:13px;" />
                        <span class="material-icons" style="cursor:pointer;">visibility_off</span>
                    </div>
                </div>

                <div class="flex items-center justify-between mb-24">
                    <label class="flex items-center gap-8"
                        style="cursor:pointer; font-size:13px; color:var(--text-secondary);">
                        <input type="checkbox" checked /> Remember me
                    </label>
                    <a href="#" class="text-sm text-primary">Forgot password?</a>
                </div>

                <a href="dashboard.html" class="btn btn-primary w-100"
                    style="justify-content:center; font-size:14px; min-height:42px;">
                    <span class="material-icons">login</span>
                    Sign In
                </a>

                <hr class="login-divider" style="margin-top:24px;" />

                <p class="text-xs text-muted" style="text-align:center;">
                    Secure access for administrators only.<br />
                    Contact your system administrator if you need access.
                </p>
            </div>

        </div>
    </div>

</body>

</html>
