<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrderPoint – Bartender Login</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <div class="login-page">

        <div class="login-card">

            <!-- Header -->
            <div class="login-header">
                <div class="login-logo-wrap">
                    <span class="material-icons">local_bar</span>
                </div>
                <div class="login-title">OrderPoint</div>
                <div class="login-subtitle">Bartender App — Sign in to continue</div>
            </div>

            <!-- Body -->
            <div class="login-body">

                <div class="form-field">
                    <label class="form-label">Email address</label>
                    <div class="input-wrap">
                        <span class="material-icons">email</span>
                        <input type="email" class="form-input" placeholder="bartender@orderpoint.com"
                            value="john.doe@orderpoint.com" />
                    </div>
                </div>

                <div class="form-field" style="margin-bottom: 12px;">
                    <label class="form-label">Password</label>
                    <div class="input-wrap" style="position:relative;">
                        <span class="material-icons">lock</span>
                        <input type="password" class="form-input" placeholder="••••••••" value="••••••••"
                            style="padding-right: 44px;" />
                        <span class="material-icons input-end-icon">visibility_off</span>
                    </div>
                </div>

                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" checked />
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <a href="orders.html" class="btn btn-primary btn-lg btn-w100" style="margin-bottom: 16px;">
                    <span class="material-icons">login</span>
                    Sign In
                </a>

                <hr class="login-divider" />

                <p class="login-hint">
                    Access for authorised bartenders only.<br />
                    Contact your manager if you need help.
                </p>

            </div>
            <!-- /login-body -->

        </div>
        <!-- /login-card -->

    </div>

</body>

</html>
